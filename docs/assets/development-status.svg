<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="120" viewBox="0 0 1200 120"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="50%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>

      <animate attributeName="x1"
               values="-100%;100%;-100%"
               dur="8s"
               repeatCount="indefinite"/>

      <animate attributeName="x2"
               values="0%;200%;0%"
               dur="8s"
               repeatCount="indefinite"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3"
                    flood-color="#000000"
                    flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0"
        width="1200"
        height="120"
        rx="12"
        fill="url(#bg)">

    <animate
      attributeName="opacity"
      values="1;0.65;1"
      dur="2.2s"
      repeatCount="indefinite"/>
  </rect>

  <text
      x="600"
      y="46"
      text-anchor="middle"
      font-family="Segoe UI, Inter, Arial, sans-serif"
      font-size="30"
      font-weight="700"
      fill="white"
      filter="url(#shadow)">
      ⚠ ACTIVE DEVELOPMENT ⚠
  </text>

  <text
      x="600"
      y="82"
      text-anchor="middle"
      font-family="Segoe UI, Inter, Arial, sans-serif"
      font-size="18"
      fill="#ffecec">
      This repository contains an early prototype published for architectural review.
  </text>

  <text
      x="600"
      y="104"
      text-anchor="middle"
      font-family="Segoe UI, Inter, Arial, sans-serif"
      font-size="15"
      fill="#ffd5d5">
      Core functionality is operational, while refactoring, backend services, and desktop UX remain in progress.
  </text>

</svg>
